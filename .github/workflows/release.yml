name: 每周构建BusyBox NDK

on:
  schedule:
    # 每周一 UTC 3:00 执行 (北京时间周一 11:00)
    - cron: '0 3 * * 1'
  workflow_dispatch: # 支持手动触发

jobs:
  # 第一个 Job：检查最新版本是否已经发布过
  check-version:
    name: 检查最新版本
    runs-on: ubuntu-latest
    outputs:
      latest-version: ${{ steps.check.outputs.latest-version }}
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # 获取完整历史用于检查 tag

      - name: 检查是否已构建
        id: check
        run: |
          # 从 BusyBox 官方仓库获取最新稳定版标签 (例如 1_36_1)
          LATEST_VERSION=$(git ls-remote --tags https://git.busybox.net/busybox | \
            grep -o 'refs/tags/[0-9]*_[0-9]*_[0-9]*' | \
            sort -V | tail -1 | sed 's/refs\/tags\///')
          
          echo "最新版本: $LATEST_VERSION"
          echo "latest-version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          
          # 检查当前仓库是否已经存在对应的 Release Tag
          if git tag --list | grep -q "busybox-$LATEST_VERSION"; then
            echo "版本 $LATEST_VERSION 已存在，跳过构建"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "版本 $LATEST_VERSION 不存在，开始构建"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  # 第二个 Job：矩阵并行构建
  build:
    name: 编译 ${{ matrix.arch }}
    needs: check-version
    if: needs.check-version.outputs.skip == 'false'
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false # 某个架构失败不影响其他架构继续编译
      matrix:
        include:
          # 主流架构：使用 NDK r29
          - arch: arm
            ndk-version: r29
            cross_compile: "arm-linux-androideabi-"
            make_arch: arm
          - arch: arm64
            ndk-version: r29
            cross_compile: "aarch64-linux-android-"
            make_arch: arm64
          - arch: x86
            ndk-version: r29
            cross_compile: "i686-linux-android-"
            make_arch: x86
          - arch: x86_64
            ndk-version: r29
            cross_compile: "x86_64-linux-android-"
            make_arch: x86_64
          # MIPS 架构：使用旧版 NDK r23c (NDK r24+ 已彻底移除 MIPS 支持)
          - arch: mips
            ndk-version: r23c
            cross_compile: "mipsel-linux-android-"
            make_arch: mips
          - arch: mips64
            ndk-version: r23c
            cross_compile: "mips64el-linux-android-"
            make_arch: mips

    steps:
      - name: 检出仓库
        uses: actions/checkout@v7

      # 使用 setup-ndk 自带的缓存功能，无需单独引入 actions/cache
      - name: 设置 NDK ${{ matrix.ndk-version }}
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ matrix.ndk-version }}
          add-to-path: false
          local-cache: true

      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bzip2 make libncurses5-dev

      - name: 下载 BusyBox 源码
        run: |
          git clone git://busybox.net/busybox.git
          cd busybox
          git checkout ${{ needs.check-version.outputs.latest-version }}

      - name: 应用 Android NDK 兼容补丁
        run: |
          cd busybox
          # 下载 osm0sis 的补丁，解决 BusyBox 与 Android Bionic libc 的兼容性问题
          wget -qO- https://github.com/osm0sis/android-busybox-ndk/archive/refs/heads/master.tar.gz | tar xz
          cp -r android-busybox-ndk-master/patches/* . 2>/dev/null || true
          for patch in patches/*.patch; do
            [ -e "$patch" ] && patch -p1 < "$patch" || true
          done

      - name: 配置与编译
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cd busybox
          export PATH="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          
          # 生成默认配置
          make ARCH=${{ matrix.make_arch }} CROSS_COMPILE=${{ matrix.cross_compile }} defconfig
          
          # 开启静态编译
          sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config
          # 关闭 Android 不兼容的特性
          sed -i 's/CONFIG_FEATURE_WTMP=y/# CONFIG_FEATURE_WTMP is not set/' .config
          sed -i 's/CONFIG_FEATURE_UTMP=y/# CONFIG_FEATURE_UTMP is not set/' .config
          
          # 多线程并行编译 (使用所有可用 CPU 核心)
          make ARCH=${{ matrix.make_arch }} CROSS_COMPILE=${{ matrix.cross_compile }} -j$(nproc)
          
          # 剥离调试信息减小体积
          ${{ matrix.cross_compile }}strip busybox
          mv busybox busybox-${{ matrix.arch }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v7
        with:
          name: busybox-${{ matrix.arch }}
          path: busybox/busybox-${{ matrix.arch }}
          if-no-files-found: error
          compression-level: 9

  # 第三个 Job：汇总并发布 Release
  release:
    name: 汇总并发布
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v7

      - name: 下载所有构建产物
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true # 直接合并到同一目录

      - name: 打包发布文件
        run: |
          mkdir -p release
          cp artifacts/busybox-* release/
          cd release
          tar -czvf busybox-ndk-all-arch-${{ needs.check-version.outputs.latest-version }}.tar.gz busybox-*
          
      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/busybox-ndk-all-arch-${{ needs.check-version.outputs.latest-version }}.tar.gz
          tag_name: busybox-${{ needs.check-version.outputs.latest-version }}
          name: BusyBox NDK ${{ needs.check-version.outputs.latest-version }}
          body: |
            ## BusyBox NDK 多架构二进制文件
            
            版本: ${{ needs.check-version.outputs.latest-version }}
            包含架构: ARM, ARM64, x86, x86_64, MIPS, MIPS64
            (MIPS 架构使用 NDK r23c 编译，其他架构使用 NDK r29)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
