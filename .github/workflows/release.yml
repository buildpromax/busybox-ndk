name: 每周构建 BusyBox NDK

on:
  schedule:
    # 每周一 UTC 3:00 执行 (北京时间周一 11:00)
    - cron: '0 3 * * 1'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write   # 创建 Release 必需,不加会 403

jobs:
  # Job 1: 检查最新版本
  check-version:
    name: 检查最新版本
    runs-on: ubuntu-latest
    outputs:
      latest-version: ${{ steps.check.outputs.latest-version }}
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 检查是否已构建
        id: check
        run: |
          # 优先从 GitHub 镜像抓 tag (git.busybox.net 经常 404/超时,不再优先用它)
          LATEST_VERSION=$(git ls-remote --tags https://github.com/vda-linux/busybox_mirror 2>/dev/null | \
            grep -o 'refs/tags/[0-9]*_[0-9]*_[0-9]*$' | \
            sort -V | tail -1 | sed 's|refs/tags/||')

          # 兜底:从下载页抓 tarball 名
          if [ -z "$LATEST_VERSION" ]; then
            echo "Git 源不可用,从下载页解析最新版本..."
            LATEST_VERSION=$(curl -fsSL https://busybox.net/downloads/ 2>/dev/null | \
              grep -oE 'busybox-[0-9]+\.[0-9]+\.[0-9]+\.tar\.bz2' | \
              sort -V | tail -1 | sed -E 's/busybox-|\.tar\.bz2//g' | tr '.' '_')
          fi

          # 最后兜底:硬编码一个近期稳定版,避免完全失败
          if [ -z "$LATEST_VERSION" ]; then
            echo "全部探测失败,使用硬编码版本 1_37_0"
            LATEST_VERSION="1_37_0"
          fi

          echo "最新版本: $LATEST_VERSION"
          echo "latest-version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"

          if git tag --list | grep -q "^busybox-${LATEST_VERSION}$"; then
            echo "版本 $LATEST_VERSION 已存在,跳过构建"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "版本 $LATEST_VERSION 不存在,开始构建"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  # Job 2: 矩阵并行构建
  build:
    name: 编译 ${{ matrix.arch }}
    needs: check-version
    if: needs.check-version.outputs.skip == 'false'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm
            ndk-version: r29
            clang_triple: armv7a-linux-androideabi
            make_arch: arm
            api: 21
          - arch: arm64
            ndk-version: r29
            clang_triple: aarch64-linux-android
            make_arch: arm64
            api: 21
          - arch: x86
            ndk-version: r29
            clang_triple: i686-linux-android
            make_arch: x86
            api: 21
          - arch: x86_64
            ndk-version: r29
            clang_triple: x86_64-linux-android
            make_arch: x86_64
            api: 21
          # MIPS 架构:NDK r24+ 已彻底移除,固定使用 r23c
          - arch: mips
            ndk-version: r23c
            clang_triple: mipsel-linux-android
            make_arch: mips
            api: 21
          - arch: mips64
            ndk-version: r23c
            clang_triple: mips64el-linux-android
            make_arch: mips
            api: 21

    steps:
      - name: 检出仓库
        uses: actions/checkout@v7

      - name: 设置 NDK ${{ matrix.ndk-version }}
        id: setup-ndk
        uses: nttld/setup-ndk@v1.6.0
        with:
          ndk-version: ${{ matrix.ndk-version }}
          add-to-path: false
          local-cache: true

      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bzip2 make libncurses5-dev file

      - name: 下载 BusyBox 源码
        run: |
          set -u
          VERSION="${{ needs.check-version.outputs.latest-version }}"
          VERSION_DOTTED=$(echo "$VERSION" | tr '_' '.')
          echo "下载版本: $VERSION (tarball 名: busybox-${VERSION_DOTTED})"

          rm -rf busybox busybox.tar.bz2
          SRC_OK=0

          # 1. 优先 wget tarball —— 体积小(~2.5MB)、可重试,比 git clone 稳得多
          for i in 1 2 3; do
            echo "尝试下载 tarball (第 $i 次)..."
            if wget --timeout=60 --tries=1 --retry-connrefused --waitretry=5 \
                   -qO busybox.tar.bz2 \
                   "https://www.busybox.net/downloads/busybox-${VERSION_DOTTED}.tar.bz2"; then
              if file busybox.tar.bz2 | grep -q 'bzip2'; then
                echo "tarball 下载成功"
                SRC_OK=1
                break
              else
                echo "下载到的东西不是 bzip2,删掉重试"
                file busybox.tar.bz2
                rm -f busybox.tar.bz2
              fi
            fi
            sleep 3
          done

          # 2. tarball 不行再 git clone (浅克隆,够用)
          if [ "$SRC_OK" -ne 1 ]; then
            echo "tarball 三次都失败,改用 git clone..."
            for i in 1 2 3; do
              echo "git clone 尝试 $i..."
              if git clone --depth 1 --branch "$VERSION" --quiet \
                   https://github.com/vda-linux/busybox_mirror.git busybox 2>/dev/null; then
                echo "git clone --branch 成功"
                SRC_OK=1
                break
              fi
              if git clone --depth 1 --quiet \
                   https://github.com/vda-linux/busybox_mirror.git busybox 2>/dev/null; then
                (cd busybox && \
                  git fetch --depth 1 origin tag "$VERSION" 2>/dev/null && \
                  git checkout --quiet "$VERSION" 2>/dev/null) || true
                if [ -f busybox/Makefile ]; then
                  echo "git clone + checkout 成功"
                  SRC_OK=1
                  break
                fi
              fi
              rm -rf busybox
              sleep 3
            done
          fi

          # 3. 解压 tarball (如果是走 tarball 路径)
          if [ "$SRC_OK" -eq 1 ] && [ -f busybox.tar.bz2 ]; then
            echo "解压 tarball..."
            tar -xjf busybox.tar.bz2
            if [ -d "busybox-${VERSION_DOTTED}" ]; then
              mv "busybox-${VERSION_DOTTED}" busybox
            elif [ -d busybox ]; then
              : # 某些 tarball 可能直接展开成 busybox/
            else
              echo "::error::tarball 解压后找不到 busybox 目录"
              ls -la
              exit 1
            fi
          fi

          if [ "$SRC_OK" -ne 1 ]; then
            echo "::error::源码下载完全失败 (tarball + git 都挂了)"
            exit 1
          fi

          # 验证源码目录就位
          # busybox.c 在 1.36+ 已经被移走了 (入口改成 libbb/appletlib.c 里的 main),
          # 不能再用 busybox.c 当存在性标志。改用 Makefile + applets/ + libbb/ 三个标志位
          if [ ! -f busybox/Makefile ]; then
            echo "::error::源码不完整,Makefile 缺失"
            ls -la busybox/ 2>/dev/null | head -20
            exit 1
          fi

          if [ ! -d busybox/applets ] || [ ! -d busybox/libbb ]; then
            echo "::error::源码不完整,applets/ 或 libbb/ 目录缺失(不是 busybox 源码根)"
            ls -la busybox/ 2>/dev/null | head -20
            exit 1
          fi

          echo "源码就位: Makefile + applets/ + libbb/ 都存在"
          head -5 busybox/Makefile
          echo "---"
          grep -E '^VERSION' busybox/Makefile | head -3 || true

      - name: 探测并补全 NDK 工具链
        id: probe-clang
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          NDK_BIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"

          # 1. 找到真实的 clang 二进制 (有版本号后缀的才是真二进制)
          CLANG_REAL=""
          for cand in clang-21 clang-20 clang-19 clang-18 clang-17 clang-15; do
            if [ -x "$NDK_BIN/$cand" ] && [ ! -L "$NDK_BIN/$cand" ]; then
              CLANG_REAL="$NDK_BIN/$cand"
              break
            fi
          done
          if [ -z "$CLANG_REAL" ]; then
            if [ -x "$NDK_BIN/clang" ]; then
              CLANG_REAL="$NDK_BIN/clang"
            fi
          fi
          if [ -z "$CLANG_REAL" ]; then
            echo "::error::找不到 NDK clang 真实二进制"
            ls "$NDK_BIN" 2>/dev/null | head -20
            exit 1
          fi
          echo "找到 NDK clang: $CLANG_REAL"
          "$CLANG_REAL" --version

          # 2. 【关键】NDK r29 bin 目录里只有 clang-21,没有裸 clang。
          #    NDK 自带的 <triple>-clang wrapper 内部 exec 裸 clang,找不到就 exit 127。
          #    我们直接创建软链: clang -> clang-21,让 wrapper 能正常 exec。
          REAL_CLANG_NAME=$(basename "$CLANG_REAL")
          CLANG_BARE="$NDK_BIN/${REAL_CLANG_NAME%-[0-9]*}"
          if [ ! -e "$CLANG_BARE" ]; then
            echo "创建裸 clang 软链: $CLANG_BARE -> $REAL_CLANG_NAME"
            ln -s "$REAL_CLANG_NAME" "$CLANG_BARE"
          fi
          echo "CLANG(裸) = $CLANG_BARE -> $(readlink -f "$CLANG_BARE")"

          # 3. 找 lld (NDK 22+ 默认 -fuse-ld=lld)
          LLD_PATH="$NDK_BIN/ld.lld"
          if [ ! -x "$LLD_PATH" ]; then
            echo "::error::找不到 ld.lld: $LLD_PATH"
            echo "bin 目录里 lld 相关的:"
            ls "$NDK_BIN" 2>/dev/null | grep -i lld
            exit 1
          fi
          echo "找到 ld.lld: $LLD_PATH"

          # 4. 找 strip/ar/ranlib
          STRIP_BIN=""
          for cand in llvm-strip strip; do
            if [ -x "$NDK_BIN/$cand" ]; then
              STRIP_BIN="$NDK_BIN/$cand"
              break
            fi
          done

          AR_BIN=""
          for cand in llvm-ar ar; do
            if [ -x "$NDK_BIN/$cand" ]; then
              AR_BIN="$NDK_BIN/$cand"
              break
            fi
          done

          RANLIB_BIN=""
          for cand in llvm-ranlib ranlib; do
            if [ -x "$NDK_BIN/$cand" ]; then
              RANLIB_BIN="$NDK_BIN/$cand"
              break
            fi
          done

          if [ -z "$STRIP_BIN" ] || [ -z "$AR_BIN" ] || [ -z "$RANLIB_BIN" ]; then
            echo "::error::NDK 工具不全:"
            echo "  STRIP=$STRIP_BIN"
            echo "  AR=$AR_BIN"
            echo "  RANLIB=$RANLIB_BIN"
            echo "bin 目录里 strip/ar/ranlib 相关的:"
            ls "$NDK_BIN" 2>/dev/null | grep -E 'strip|ar$|ranlib'
            exit 1
          fi

          echo "工具链 OK:"
          echo "  CLANG = $CLANG_BARE"
          echo "  LLD   = $LLD_PATH"
          echo "  STRIP = $STRIP_BIN"
          echo "  AR    = $AR_BIN"
          echo "  RANLIB= $RANLIB_BIN"

          {
            echo "clang=$CLANG_BARE"
            echo "lld=$LLD_PATH"
            echo "strip=$STRIP_BIN"
            echo "ar=$AR_BIN"
            echo "ranlib=$RANLIB_BIN"
          } >> "$GITHUB_OUTPUT"

      - name: 配置与编译
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          CLANG: ${{ steps.probe-clang.outputs.clang }}
          LLD: ${{ steps.probe-clang.outputs.lld }}
          STRIP: ${{ steps.probe-clang.outputs.strip }}
          AR: ${{ steps.probe-clang.outputs.ar }}
          RANLIB: ${{ steps.probe-clang.outputs.ranlib }}
        run: |
          cd busybox

          # 用 NDK wrapper 编译。
          # wrapper(<triple><api>-clang) -> 软链 clang -> 真 clang-21
          # 同时用 -B 让 wrapper 内的 clang 在 bin 目录找 ld.lld
          NDK_BIN_DIR=$(dirname "$LLD")
          make ARCH=${{ matrix.make_arch }} \
               CC="$CLANG -B$NDK_BIN_DIR" \
               STRIP="$STRIP" \
               AR="$AR" \
               RANLIB="$RANLIB" \
               defconfig

          # 静态编译:让 binary 独立运行
          sed -i 's|# CONFIG_STATIC is not set|CONFIG_STATIC=y|' .config
          # 关掉 Android 上有问题的特性
          sed -i 's|CONFIG_FEATURE_WTMP=y|# CONFIG_FEATURE_WTMP is not set|' .config
          sed -i 's|CONFIG_FEATURE_UTMP=y|# CONFIG_FEATURE_UTMP is not set|' .config
          # 关掉 crosstool/NDK 容易炸的 selinux/namespace 相关选项
          sed -i 's|CONFIG_FEATURE_NSLOOKUP=y|# CONFIG_FEATURE_NSLOOKUP is not set|' .config || true

          # 编译
          make ARCH=${{ matrix.make_arch }} \
               CC="$CLANG -B$NDK_BIN_DIR" \
               STRIP="$STRIP" \
               AR="$AR" \
               RANLIB="$RANLIB" \
               -j"$(nproc)"

          # 验证产物
          file busybox
          ls -la busybox

          # 二次 strip 瘦身
          "$STRIP" busybox
          mv busybox "busybox-${{ matrix.arch }}"
          ls -la "busybox-${{ matrix.arch }}"

      - name: 上传构建产物
        uses: actions/upload-artifact@v7
        with:
          name: busybox-${{ matrix.arch }}
          path: busybox/busybox-${{ matrix.arch }}
          if-no-files-found: error
          compression-level: 9

  # Job 3: 汇总并发布 Release
  release:
    name: 汇总并发布
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # 推送 tag 需要历史,否则 softprops 可能推不上去

      - name: 下载所有构建产物
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: 验证产物并生成 SHA256
        run: |
          mkdir -p release
          cd artifacts
          # 检查每个架构都有产物
          for arch in arm arm64 x86 x86_64 mips mips64; do
            if [ ! -f "busybox-$arch" ]; then
              echo "::error::缺少 busybox-$arch 产物"
              exit 1
            fi
            file "busybox-$arch"
          done
          cp busybox-* ../release/
          cd ../release
          sha256sum busybox-* > SHA256SUMS
          cat SHA256SUMS
          tar -czf "busybox-ndk-all-arch-${{ needs.check-version.outputs.latest-version }}.tar.gz" busybox-*
          ls -la

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release/busybox-ndk-all-arch-${{ needs.check-version.outputs.latest-version }}.tar.gz
            release/SHA256SUMS
          tag_name: busybox-${{ needs.check-version.outputs.latest-version }}
          name: "BusyBox NDK ${{ needs.check-version.outputs.latest-version }}"
          body: |
            ## BusyBox NDK 多架构二进制

            版本: `${{ needs.check-version.outputs.latest-version }}`

            包含架构:
            - ARM (armv7a) — NDK r29
            - ARM64 (aarch64) — NDK r29
            - x86 (i686) — NDK r29
            - x86_64 — NDK r29
            - MIPS (mipsel) — NDK r23c
            - MIPS64 (mips64el) — NDK r23c

            API 等级: 21 (Android 5.0 Lollipop)

            ## 使用方法

            ```bash
            # 举例:推到 Android 设备
            adb push busybox-arm64 /data/local/tmp/busybox
            adb shell chmod 755 /data/local/tmp/busybox
            adb shell /data/local/tmp/busybox --install -s /data/local/tmp/bb
            ```

            ## 校验

            下载 `SHA256SUMS` 并执行 `sha256sum -c SHA256SUMS` 验证完整性。

            提示:MIPS 架构 NDK r24+ 已停止支持,本仓库固定使用 r23c 编译。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
