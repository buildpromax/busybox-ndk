name: 每周构建BusyBox NDK

on:
  schedule:
    # 每周一 UTC 3:00 执行 (北京时间周一 11:00)
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  # Job 1: 检查最新版本是否已存在
  check-version:
    name: 检查最新版本
    runs-on: ubuntu-latest
    outputs:
      latest-version: ${{ steps.check.outputs.latest-version }}
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 检查是否已构建
        id: check
        run: |
          # 优先从官方源获取最新版本
          LATEST_VERSION=$(git ls-remote --tags https://git.busybox.net/busybox | \
            grep -o 'refs/tags/[0-9]*_[0-9]*_[0-9]*' | \
            sort -V | tail -1 | sed 's/refs\/tags\///')
          
          # 如果官方源失败，尝试GitHub镜像
          if [ -z "$LATEST_VERSION" ]; then
            echo "官方源不可用，尝试GitHub镜像..."
            LATEST_VERSION=$(git ls-remote --tags https://github.com/vda-linux/busybox_mirror | \
              grep -o 'refs/tags/[0-9]*_[0-9]*_[0-9]*' | \
              sort -V | tail -1 | sed 's/refs\/tags\///')
          fi
          
          echo "最新版本: $LATEST_VERSION"
          echo "latest-version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          
          if git tag --list | grep -q "busybox-$LATEST_VERSION"; then
            echo "版本 $LATEST_VERSION 已存在，跳过构建"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "版本 $LATEST_VERSION 不存在，开始构建"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  # Job 2: 矩阵并行构建
  build:
    name: 编译 ${{ matrix.arch }}
    needs: check-version
    if: needs.check-version.outputs.skip == 'false'
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm
            ndk-version: r29
            cross_compile: "arm-linux-androideabi-"
            clang_target: "armv7a-linux-androideabi21-clang"
            make_arch: arm
          - arch: arm64
            ndk-version: r29
            cross_compile: "aarch64-linux-android-"
            clang_target: "aarch64-linux-android21-clang"
            make_arch: arm64
          - arch: x86
            ndk-version: r29
            cross_compile: "i686-linux-android-"
            clang_target: "i686-linux-android21-clang"
            make_arch: x86
          - arch: x86_64
            ndk-version: r29
            cross_compile: "x86_64-linux-android-"
            clang_target: "x86_64-linux-android21-clang"
            make_arch: x86_64
          - arch: mips
            ndk-version: r23c
            cross_compile: "mipsel-linux-android-"
            clang_target: "mipsel-linux-android21-clang"
            make_arch: mips
          - arch: mips64
            ndk-version: r23c
            cross_compile: "mips64el-linux-android-"
            clang_target: "mips64el-linux-android21-clang"
            make_arch: mips

    steps:
      - name: 检出仓库
        uses: actions/checkout@v7

      - name: 设置 NDK ${{ matrix.ndk-version }}
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ matrix.ndk-version }}
          add-to-path: false
          local-cache: true

      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bzip2 make libncurses5-dev

      - name: 下载 BusyBox 源码
        run: |
          # 优先从官方源下载
          git clone git://busybox.net/busybox.git
          cd busybox
          git checkout ${{ needs.check-version.outputs.latest-version }}
          
          # 如果官方源失败，尝试GitHub镜像
          if [ $? -ne 0 ]; then
            echo "官方源不可用，尝试GitHub镜像..."
            cd ..
            rm -rf busybox
            git clone https://github.com/vda-linux/busybox_mirror.git busybox
            cd busybox
            git checkout ${{ needs.check-version.outputs.latest-version }}
          fi

      - name: 应用 Android NDK 兼容补丁
        run: |
          cd busybox
          # 下载 osm0sis 的补丁，解决 BusyBox 与 Android Bionic libc 的兼容性问题
          wget -qO- https://github.com/osm0sis/android-busybox-ndk/archive/refs/heads/master.tar.gz | tar xz
          cp -r android-busybox-ndk-master/patches/* . 2>/dev/null || true
          for patch in patches/*.patch; do
            [ -e "$patch" ] && patch -p1 < "$patch" || true
          done

      - name: 创建 GCC/strip 符号链接
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          NDK_BIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          
          # 强制删除可能残留的旧包装器脚本或链接
          rm -f "$NDK_BIN/${{ matrix.cross_compile }}gcc"
          rm -f "$NDK_BIN/${{ matrix.cross_compile }}cc"
          rm -f "$NDK_BIN/${{ matrix.cross_compile }}strip"
          rm -f "$NDK_BIN/${{ matrix.cross_compile }}ar"
          rm -f "$NDK_BIN/${{ matrix.cross_compile }}as"
          rm -f "$NDK_BIN/${{ matrix.cross_compile }}nm"
          rm -f "$NDK_BIN/${{ matrix.cross_compile }}objcopy"
          rm -f "$NDK_BIN/${{ matrix.cross_compile }}objdump"
          rm -f "$NDK_BIN/${{ matrix.cross_compile }}ranlib"
          rm -f "$NDK_BIN/${{ matrix.cross_compile }}readelf"
          
          # 创建纯符号链接，直接指向带 API 级别的 clang
          ln -sf "${{ matrix.clang_target }}" "$NDK_BIN/${{ matrix.cross_compile }}gcc"
          ln -sf "${{ matrix.clang_target }}" "$NDK_BIN/${{ matrix.cross_compile }}cc"
          ln -sf "llvm-strip" "$NDK_BIN/${{ matrix.cross_compile }}strip"
          ln -sf "llvm-ar" "$NDK_BIN/${{ matrix.cross_compile }}ar"
          ln -sf "llvm-as" "$NDK_BIN/${{ matrix.cross_compile }}as"
          ln -sf "llvm-nm" "$NDK_BIN/${{ matrix.cross_compile }}nm"
          ln -sf "llvm-objcopy" "$NDK_BIN/${{ matrix.cross_compile }}objcopy"
          ln -sf "llvm-objdump" "$NDK_BIN/${{ matrix.cross_compile }}objdump"
          ln -sf "llvm-ranlib" "$NDK_BIN/${{ matrix.cross_compile }}ranlib"
          ln -sf "llvm-readelf" "$NDK_BIN/${{ matrix.cross_compile }}readelf"
          
          # 验证符号链接是否工作
          echo "验证 gcc 符号链接:"
          ls -l "$NDK_BIN/${{ matrix.cross_compile }}gcc"
          "$NDK_BIN/${{ matrix.cross_compile }}gcc" --version
          
          echo "验证 strip 符号链接:"
          ls -l "$NDK_BIN/${{ matrix.cross_compile }}strip"
          "$NDK_BIN/${{ matrix.cross_compile }}strip" --version

      - name: 配置与编译
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cd busybox
          export PATH="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          
          # 生成默认配置
          make ARCH=${{ matrix.make_arch }} CROSS_COMPILE=${{ matrix.cross_compile }} defconfig
          
          # 开启静态编译，确保二进制文件在 Android 上独立运行无依赖
          sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config
          # 关闭在 Android 上不兼容的特性
          sed -i 's/CONFIG_FEATURE_WTMP=y/# CONFIG_FEATURE_WTMP is not set/' .config
          sed -i 's/CONFIG_FEATURE_UTMP=y/# CONFIG_FEATURE_UTMP is not set/' .config
          
          # 多线程并行编译 (使用所有可用 CPU 核心)
          make ARCH=${{ matrix.make_arch }} CROSS_COMPILE=${{ matrix.cross_compile }} -j$(nproc)
          
          # 剥离调试信息减小体积
          ${{ matrix.cross_compile }}strip busybox
          mv busybox busybox-${{ matrix.arch }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v7
        with:
          name: busybox-${{ matrix.arch }}
          path: busybox/busybox-${{ matrix.arch }}
          if-no-files-found: error
          compression-level: 9

  # Job 3: 汇总并发布 Release
  release:
    name: 汇总并发布
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v7

      - name: 下载所有构建产物
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: 打包发布文件
        run: |
          mkdir -p release
          cp artifacts/busybox-* release/
          cd release
          tar -czvf busybox-ndk-all-arch-${{ needs.check-version.outputs.latest-version }}.tar.gz busybox-*
          
      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/busybox-ndk-all-arch-${{ needs.check-version.outputs.latest-version }}.tar.gz
          tag_name: busybox-${{ needs.check-version.outputs.latest-version }}
          name: BusyBox NDK ${{ needs.check-version.outputs.latest-version }}
          body: |
            ## BusyBox NDK 多架构二进制文件
            
            版本: ${{ needs.check-version.outputs.latest-version }}
            包含架构: ARM, ARM64, x86, x86_64, MIPS, MIPS64
            (MIPS 架构使用 NDK r23c 编译，其他架构使用 NDK r29)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
