name: 每周构建BusyBox NDK

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  check-version:
    name: 检查最新版本
    runs-on: ubuntu-latest
    outputs:
      latest-version: ${{ steps.check.outputs.latest-version }}
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 检查是否已构建
        id: check
        run: |
          # 从官方下载页面获取最新版本
          LATEST_VERSION=$(wget -qO- https://busybox.net/downloads/ | \
            grep -o 'busybox-[0-9]\+\.[0-9]\+\.[0-9]\+\.tar\.bz2' | \
            head -1 | sed 's/busybox-\([0-9.]*\)\.tar\.bz2/\1/')
          
          echo "最新版本: $LATEST_VERSION"
          echo "latest-version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          
          if git tag --list | grep -q "busybox-$LATEST_VERSION"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: 编译 ${{ matrix.arch }}
    needs: check-version
    if: needs.check-version.outputs.skip == 'false'
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm
            ndk-version: r29
            clang_target: "armv7a-linux-androideabi21-clang"
            make_arch: arm
          - arch: arm64
            ndk-version: r29
            clang_target: "aarch64-linux-android21-clang"
            make_arch: arm64
          - arch: x86
            ndk-version: r29
            clang_target: "i686-linux-android21-clang"
            make_arch: x86
          - arch: x86_64
            ndk-version: r29
            clang_target: "x86_64-linux-android21-clang"
            make_arch: x86_64
          - arch: mips
            ndk-version: r23c
            clang_target: "mipsel-linux-android21-clang"
            make_arch: mips
          - arch: mips64
            ndk-version: r23c
            clang_target: "mips64el-linux-android21-clang"
            make_arch: mips

    steps:
      - name: 检出仓库
        uses: actions/checkout@v7

      - name: 设置 NDK ${{ matrix.ndk-version }}
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ matrix.ndk-version }}
          add-to-path: false
          local-cache: true

      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bzip2 make libncurses5-dev

      - name: 下载 BusyBox 源码
        run: |
          # 直接从官网下载源码包，避免Git克隆问题
          wget -qO busybox.tar.bz2 "https://busybox.net/downloads/busybox-${{ needs.check-version.outputs.latest-version }}.tar.bz2"
          tar -xjf busybox.tar.bz2
          mv busybox-${{ needs.check-version.outputs.latest-version }} busybox

      - name: 应用 Android NDK 兼容补丁
        run: |
          cd busybox
          # 下载 osm0sis 的补丁
          wget -qO- https://github.com/osm0sis/android-busybox-ndk/archive/refs/heads/master.tar.gz | tar xz
          cp -r android-busybox-ndk-master/patches/* . 2>/dev/null || true
          for patch in patches/*.patch; do
            [ -e "$patch" ] && patch -p1 < "$patch" || true
          done

      - name: 配置与编译 (直接使用Clang)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cd busybox
          NDK_BIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export PATH="$NDK_BIN:$PATH"
          
          # 直接使用NDK中的Clang编译器，不创建任何符号链接
          make ARCH=${{ matrix.make_arch }} \
               CC="$NDK_BIN/${{ matrix.clang_target }}" \
               STRIP="$NDK_BIN/llvm-strip" \
               defconfig
          
          # 开启静态编译
          sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config
          sed -i 's/CONFIG_FEATURE_WTMP=y/# CONFIG_FEATURE_WTMP is not set/' .config
          sed -i 's/CONFIG_FEATURE_UTMP=y/# CONFIG_FEATURE_UTMP is not set/' .config
          
          # 多线程编译
          make ARCH=${{ matrix.make_arch }} \
               CC="$NDK_BIN/${{ matrix.clang_target }}" \
               STRIP="$NDK_BIN/llvm-strip" \
               -j$(nproc)
          
          # 剥离调试信息
          "$NDK_BIN/llvm-strip" busybox
          mv busybox busybox-${{ matrix.arch }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v7
        with:
          name: busybox-${{ matrix.arch }}
          path: busybox/busybox-${{ matrix.arch }}
          if-no-files-found: error
          compression-level: 9

  release:
    name: 汇总并发布
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v7

      - name: 下载所有构建产物
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: 打包发布文件
        run: |
          mkdir -p release
          cp artifacts/busybox-* release/
          cd release
          tar -czvf busybox-ndk-all-arch-${{ needs.check-version.outputs.latest-version }}.tar.gz busybox-*
          
      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/busybox-ndk-all-arch-${{ needs.check-version.outputs.latest-version }}.tar.gz
          tag_name: busybox-${{ needs.check-version.outputs.latest-version }}
          name: BusyBox NDK ${{ needs.check-version.outputs.latest-version }}
          body: |
            ## BusyBox NDK 多架构二进制文件
            
            版本: ${{ needs.check-version.outputs.latest-version }}
            包含架构: ARM, ARM64, x86, x86_64, MIPS, MIPS64
            (MIPS 架构使用 NDK r23c 编译，其他架构使用 NDK r29)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
